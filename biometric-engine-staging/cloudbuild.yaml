################################################################################
# cloudbuild.yaml — Branch-based CD for Cloud Run (app + model service)
#
# Use this same file for staging and production by changing substitutions in
# your Cloud Build trigger.
################################################################################

substitutions:
  _PROJECT_ID: "PROJECT_ID"
  _REGION: "REGION"
  _REPOSITORY_NAME: "REPOSITORY_NAME"

  # Base service names (the pipeline appends -${_ENV})
  _SERVICE_NAME: "biometric-engine"
  _MODEL_SERVICE_NAME: "biometric-model"

  # Environment profile: staging | prod
  _ENV: "staging"

  # Auth profile: true => public endpoint, false => private endpoint
  _ALLOW_UNAUTH: "true"

  # Secret Manager secret names (same project)
  _SUPABASE_URL_SECRET: "supabase-url"
  _SUPABASE_SERVICE_KEY_SECRET: "supabase-service-key"
  _JWT_SECRET_SECRET: "jwt-secret"
  _SMTP_USER_SECRET: "smtp-user"
  _SMTP_PASS_SECRET: "smtp-pass"
  _MODEL_BUCKET: "biosecuregate-models"
  _MODEL_OBJECT: "arcface.onnx"

steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "fetch-model"
    entrypoint: bash
    args:
      - -ceu
      - |
        mkdir -p app/models
        gcloud storage cp "gs://${_MODEL_BUCKET}/${_MODEL_OBJECT}" "app/models/arcface.onnx"

  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    waitFor: ["fetch-model"]
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_SERVICE_NAME}-${_ENV}:$SHORT_SHA"
      - -f
      - Dockerfile
      - .

  - name: "gcr.io/cloud-builders/docker"
    id: "build-model"
    waitFor: ["fetch-model"]
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_MODEL_SERVICE_NAME}-${_ENV}:$SHORT_SHA"
      - -f
      - Dockerfile.model
      - .

  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    waitFor: ["build-backend"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_SERVICE_NAME}-${_ENV}:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-model"
    waitFor: ["build-model"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_MODEL_SERVICE_NAME}-${_ENV}:$SHORT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-model"
    waitFor: ["push-model"]
    entrypoint: bash
    args:
      - -ceu
      - |
        auth_flag="--allow-unauthenticated"
        if [ "${_ALLOW_UNAUTH}" = "false" ]; then
          auth_flag="--no-allow-unauthenticated"
        fi

        gcloud run deploy "${_MODEL_SERVICE_NAME}-${_ENV}" \
          --image "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_MODEL_SERVICE_NAME}-${_ENV}:$SHORT_SHA" \
          --region "${_REGION}" \
          --platform managed \
          --port 8080 \
          ${auth_flag} \
          --memory 2Gi \
          --cpu 2 \
          --timeout 300 \
          --set-env-vars "FACE_MODEL_PATH=app/models/arcface.onnx,FINGERPRINT_THRESHOLD=0.85,FINGERPRINT_FP_SCORE_THRESHOLD=0.85,FINGERPRINT_V2_THRESHOLD=0.40,FINGERPRINT_V2_QUALITY_THRESHOLD=0.28,FINGERPRINT_V2_FP_SCORE_THRESHOLD=0.20,FINGERPRINT_V2_LIKENESS_THRESHOLD=0.50"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    waitFor: ["push-backend", "deploy-model"]
    entrypoint: bash
    args:
      - -ceu
      - |
        auth_flag="--allow-unauthenticated"
        if [ "${_ALLOW_UNAUTH}" = "false" ]; then
          auth_flag="--no-allow-unauthenticated"
        fi

        model_url="$(gcloud run services describe "${_MODEL_SERVICE_NAME}-${_ENV}" --region "${_REGION}" --format='value(status.url)')"

        gcloud run deploy "${_SERVICE_NAME}-${_ENV}" \
          --image "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_SERVICE_NAME}-${_ENV}:$SHORT_SHA" \
          --region "${_REGION}" \
          --platform managed \
          --port 8080 \
          ${auth_flag} \
          --memory 1Gi \
          --cpu 1 \
          --timeout 300 \
          --set-env-vars "MODEL_SERVICE_URL=${model_url},SKIP_2FA=false,SIMILARITY_THRESHOLD=0.45,FACE_MODEL_PATH=app/models/arcface.onnx,FINGERPRINT_THRESHOLD=0.85,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,SMTP_FROM=villagreeneco@gmail.com,FINGERPRINT_V2_THRESHOLD=0.40,FINGERPRINT_V2_QUALITY_THRESHOLD=0.28,FINGERPRINT_V2_LIKENESS_THRESHOLD=0.50" \
          --set-secrets "SUPABASE_URL=${_SUPABASE_URL_SECRET}:latest,SUPABASE_SERVICE_KEY=${_SUPABASE_SERVICE_KEY_SECRET}:latest,JWT_SECRET=${_JWT_SECRET_SECRET}:latest,SMTP_USER=${_SMTP_USER_SECRET}:latest,SMTP_PASS=${_SMTP_PASS_SECRET}:latest"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_SERVICE_NAME}-${_ENV}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY_NAME}/${_MODEL_SERVICE_NAME}-${_ENV}:$SHORT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
